<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Partidas ahdhdhajag</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .card { background: #fff; border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        .header { font-weight: bold; border-bottom: 2px solid #2e7d32; margin-bottom: 8px; padding-bottom: 5px; }
        .jugador { font-size: 0.9em; margin: 2px 0; }
    </style>
</head>
<body>
    <div id="app">Cargando...</div>
    <script>
        async function cargar() {
            try {
                const res = await fetch('/api/proxy');
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');

                // Eliminamos elementos que sabemos que son basura
                doc.querySelectorAll('script, style, img, .btn, .categoria, .no-disponible, [style*="display: none"]').forEach(e => e.remove());

                let htmlResultado = '';
                // Buscamos contenedores que tengan información de pista
                const bloques = doc.querySelectorAll('tr, div[class*="grid"]');

                bloques.forEach(bloque => {
                    const texto = bloque.innerText.trim();
                    // Solo procesamos si contiene "Pista" y una hora
                    if (texto.includes('Pista') && /\d{1,2}:\d{2}/.test(texto)) {
                        
                        // Obtenemos solo el texto limpio de nombres y niveles, ignorando botones
                        const lineas = texto.split('\n')
                            .map(l => l.trim())
                            .filter(l => l.length > 5 && 
                                         !l.toLowerCase().includes('apuntarse') && 
                                         !l.toLowerCase().includes('completa') &&
                                         !l.toLowerCase().includes('no disponible'));

                        // Evitamos duplicados comparando con el último bloque procesado
                        if (htmlResultado.indexOf(lineas[0]) === -1) {
                            htmlResultado += `<div class="card">
                                <div class="header">${lineas[0]}</div>
                                ${lineas.slice(1).map(l => `<div class="jugador">${l}</div>`).join('')}
                            </div>`;
                        }
                    }
                });
                document.getElementById('app').innerHTML = htmlResultado || "No hay partidas.";
            } catch (e) {
                document.getElementById('app').innerHTML = "Error.";
            }
        }
        cargar();
    </script>
</body>
</html>
