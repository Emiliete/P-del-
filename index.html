<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>asdafdsa- Padel Alboraya</title>
    <style>
        body { font-family: sans-serif; background: #f0f7f0; padding: 20px; }
        .titulo { color: #2e7d32; text-align: center; }
        .card { background: #fff; border: 2px solid #2e7d32; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        .pista { font-weight: bold; color: #1b5e20; border-bottom: 1px solid #c8e6c9; margin-bottom: 10px; padding-bottom: 5px; }
        .jugador-contenedor { display: flex; align-items: center; margin: 5px 0; }
        .fotoParticipante { width: 30px; height: 30px; border-radius: 50%; margin-right: 10px; object-fit: cover; background: #ddd; }
    </style>
</head>
<body>
    <h1 class="titulo">Partidas</h1>
    <div id="app">Cargando...</div>

    <script>
        fetch('/api/proxy')
            .then(res => res.text())
            .then(html => {
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const output = document.getElementById('app');
                let htmlResultado = '';
                
                // Buscamos los bloques de partida (ajusta este selector si es necesario)
                const bloques = doc.querySelectorAll('tr, div[class*="grid"]');
                
                bloques.forEach(bloque => {
                    const texto = bloque.innerText.trim();
                    if (texto.includes('Pista') && /\d{1,2}:\d{2}/.test(texto)) {
                        
                        // Extraemos los jugadores y sus imágenes
                        const lineas = texto.split('\n').filter(l => l.trim().length > 3);
                        const imagenes = bloque.querySelectorAll('.fotoParticipante');
                        
                        htmlResultado += `<div class="card">
                            <div class="pista">${lineas[0]}</div>`;
                            
                        // Iteramos sobre las líneas de jugadores
                        lineas.slice(1).forEach((nombre, index) => {
                            const img = imagenes[index] ? imagenes[index].getAttribute('src') : '';
                            const srcCompleto = img ? (img.startsWith('http') ? img : 'https://www.padelalborayaindoor.com/' + img) : '';
                            
                            htmlResultado += `
                                <div class="jugador-contenedor">
                                    ${srcCompleto ? `<img src="${srcCompleto}" class="fotoParticipante" onerror="this.style.display='none'">` : ''}
                                    <div class="jugador">${nombre}</div>
                                </div>`;
                        });
                        
                        htmlResultado += `</div>`;
                    }
                });

                output.innerHTML = htmlResultado || "No hay partidas visibles.";
            })
            .catch(() => {
                document.getElementById('app').innerHTML = "Error al conectar.";
            });
    </script>
</body>
</html>
