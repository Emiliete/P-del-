<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Partidas Padel</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #2e7d32; color: white; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; margin-right: 5px; vertical-align: middle; }
        .completa { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Partidas Programadas</h2>
    <div id="app">Procesando datos...</div>

    <script>
        async function fetchMatches() {
            try {
                // Suponiendo que el HTML original está en la misma página o cargado vía proxy
                const text = document.body.innerHTML; 
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                
                let matches = [];
                // Ajusta este selector según cómo detectes cada bloque de partida
                const bloques = Array.from(doc.querySelectorAll('.bloque-partida')); 

                bloques.forEach(bloque => {
                    const hora = bloque.querySelector('.hora').innerText;
                    const pista = parseInt(bloque.querySelector('.pista').innerText);
                    const jugadoresHtml = bloque.querySelector('.jugadores-container').innerHTML;
                    const esCompleta = bloque.innerText.includes('Completa');
                    
                    matches.push({
                        hora: hora,
                        minutos: parseInt(hora.split(':')[0]) * 60 + parseInt(hora.split(':')[1]),
                        pista: pista,
                        jugadoresHtml: jugadoresHtml,
                        estado: esCompleta ? '<span class="completa">Completa</span>' : 'Disponible'
                    });
                });

                matches.sort((a, b) => a.minutos - b.minutos || a.pista - b.pista);

                let html = `<table><tr><th>Hora</th><th>Pista</th><th>Jugadores</th><th>Estado</th></tr>`;
                matches.forEach(m => {
                    html += `<tr><td>${m.hora}</td><td>${m.pista}</td><td>${m.jugadoresHtml}</td><td>${m.estado}</td></tr>`;
                });
                html += `</table>`;
                document.getElementById('app').innerHTML = html;
            } catch (e) { document.getElementById('app').innerHTML = "Error al procesar."; }
        }
        fetchMatches();
    </script>
</body>
</html>
