<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor Diagnóstico</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.5; }
        .log { background: #eee; padding: 10px; border-radius: 5px; font-family: monospace; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <h1>Visor de Partidas</h1>
    <div id="status" class="log">Conectando...</div>
    <div id="container"></div>

    <script>
        async function diagnostico() {
            const statusDiv = document.getElementById('status');
            try {
                const response = await fetch('/api/proxy');
                const html = await response.text();
                
                // Diagnóstico básico
                const tieneTabla = html.includes('table') || html.includes('gridview');
                statusDiv.innerHTML = `Conexión exitosa. ¿Contiene tabla?: ${tieneTabla}`;

                const doc = new DOMParser().parseFromString(html, 'text/html');
                const filas = doc.querySelectorAll('tr');
                
                let htmlResultado = '<table><tr><th>Contenido encontrado (primeras 5 filas)</th></tr>';
                
                filas.forEach((fila, index) => {
                    if(index < 5) {
                        htmlResultado += `<tr><td>${fila.innerText.substring(0, 100)}</td></tr>`;
                    }
                });

                document.getElementById('container').innerHTML = htmlResultado + '</table>';
            } catch (err) {
                statusDiv.innerHTML = "Error de conexión: " + err.message;
            }
        }
        diagnostico();
    </script>
</body>
</html>
