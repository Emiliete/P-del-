<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Partidas Padel</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #2e7d32; color: white; }
    </style>
</head>
<body>

    <h1>Partidas Programadas</h1>
    <table id="tabla-resultado">
        <thead>
            <tr><th>Hora</th><th>Pista</th><th>Jugadores</th><th>Estado</th></tr>
        </thead>
        <tbody id="app">
            <tr><td colspan="4">Cargando datos...</td></tr>
        </tbody>
    </table>

    <script>
        async function cargarPartidas() {
            try {
                // Aquí llamarás a tu función de Vercel (api/partidas)
                const response = await fetch('/api/partidas'); 
                const data = await response.json();
                
                const tbody = document.getElementById('app');
                tbody.innerHTML = data.partidas.map(p => `
                    <tr>
                        <td>${p.hora}</td>
                        <td>${p.pista}</td>
                        <td>${p.jugadores}</td>
                        <td>${p.estado}</td>
                    </tr>
                `).join('');
            } catch (e) {
                document.getElementById('app').innerHTML = "<tr><td colspan='4'>Error al conectar con el servidor.</td></tr>";
            }
        }

        cargarPartidas();
    </script>
</body>
</html>
