<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Partidas Padel Alboraya</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #e8f5e9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; border: 2px solid black; padding: 20px; border-radius: 10px; }
        h1 { color: #2e7d32; text-align: center; }
        .match-card { border: 1px solid black; background: #c8e6c9; margin: 15px 0; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Partidas en directo</h1>
        <div id="app">Cargando partidas...</div>
    </div>
    <script>
        async function fetchMatches() {
            try {
                const res = await fetch('/api/proxy');
                const html = await res.text();
                document.getElementById('app').innerHTML = "Datos recibidos correctamente.";
            } catch (e) {
                document.getElementById('app').innerHTML = "Error al cargar los datos.";
            }
        }
        setInterval(fetchMatches, 20000);
        fetchMatches();
    </script>
</body>
</html>
