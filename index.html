<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Partidas Padel Alboraya</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #e8f5e9; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        h1 { color: #2e7d32; text-align: center; }
        .match-card { border: 2px solid black; background: #c8e6c9; margin: 15px 0; padding: 15px; border-radius: 8px; }
        .pista-titulo { font-weight: bold; font-size: 1.2em; border-bottom: 1px solid black; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Partidas en directo</h1>
        <div id="app">Cargando partidas...</div>
    </div>
    <script>
        async function fetchMatches() {
            try {
                const res = await fetch('/api/proxy');
                const htmlText = await res.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                
                // Buscamos los elementos que contienen la info de pistas
                // (Esto es una aproximación basada en cómo suelen estructurarse estas webs)
                const container = document.getElementById('app');
                container.innerHTML = ''; // Limpiamos

                // Buscamos todos los textos que empiecen por "Pista"
                const textContent = doc.body.innerText;
                const lines = textContent.split('\n');
                
                lines.forEach(line => {
                    if (line.includes('Pista')) {
                        const div = document.createElement('div');
                        div.className = 'match-card';
                        div.innerHTML = `<span class="pista-titulo">${line}</span>`;
                        container.appendChild(div);
                    }
                });
                
                if (container.innerHTML === '') container.innerHTML = "No se pudieron procesar los detalles. Revisa la web original.";
            } catch (e) {
                document.getElementById('app').innerHTML = "Error al procesar.";
            }
        }
        setInterval(fetchMatches, 20000);
        fetchMatches();
    </script>
</body>
</html>
