<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Partidas - Padel Alboraya</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #fdfdfd; 
            padding: 20px; 
            color: #2d3436; 
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: #2e7d32; }

        .partida-card { 
            background: #e8f5e9; /* Verde pastel suave */
            border: 2px solid #000000; /* Bordes negros definidos */
            padding: 16px; 
            margin-bottom: 12px; 
            border-radius: 8px;
        }

        .header-partida {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            margin-bottom: 10px;
            border-bottom: 1px solid #000;
            padding-bottom: 5px;
        }

        .vs-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-weight: 600;
        }

        .equipo { text-align: center; font-size: 0.9em; }
        .vs-text { font-style: italic; color: #555; }
        
        .img-jugador { 
            width: 35px; height: 35px; 
            border-radius: 50%; border: 1px solid #000;
            display: block; margin: 0 auto 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Partidas</h1>
        <div id="resultado">Procesando...</div>
    </div>

    <script>
        async function cargarPartidas() {
            try {
                const res = await fetch('/api/proxy');
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const texto = doc.body.innerText;
                const bloques = texto.split('Pista');
                let htmlResultado = '';
                
                bloques.forEach((bloque, index) => {
                    if (/\d{1,2}:\d{2}/.test(bloque)) {
                        // Extraer datos básicos
                        const horaMatch = bloque.match(/\d{1,2}:\d{2}/);
                        const hora = horaMatch ? horaMatch[0] : '';
                        const pista = bloque.substring(0, 2).trim();
                        
                        // Separar equipos (asumiendo formato "Eq. A... Eq. B")
                        const partes = bloque.split('Eq. B');
                        const eqA = partes[0].split('Eq. A')[1] || "Jugadores...";
                        const eqB = partes[1] || "Jugadores...";

                        htmlResultado += `
                            <div class="partida-card">
                                <div class="header-partida">
                                    <span>${hora}</span>
                                    <span>Pista ${pista}</span>
                                </div>
                                <div class="vs-container">
                                    <div class="equipo">A<br>${eqA.substring(0, 15)}...</div>
                                    <div class="vs-text">VS</div>
                                    <div class="equipo">B<br>${eqB.substring(0, 15)}...</div>
                                </div>
                            </div>`;
                    }
                });
                document.getElementById('resultado').innerHTML = htmlResultado || "No hay partidas.";
            } catch (e) { document.getElementById('resultado').innerHTML = "Error al cargar."; }
        }
        cargarPartidas();
    </script>
</body>
</html>
