<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Partidas</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #2e7d32; color: white; }
    </style>
</head>
<body>
    <h1>Partidas Programadas</h1>
    <div id="resultado">Procesando...</div>

    <script>
        async function cargar() {
            try {
                const res = await fetch('/api/proxy');
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const filas = doc.querySelectorAll('tr');
                
                let tablaHtml = '<table><tr><th>Pista</th><th>Hora</th></tr>';
                
                filas.forEach(f => {
                    const texto = f.innerText.trim();
                    // Buscamos filas que tengan "Pista" y una hora
                    if (texto.includes('Pista') && /\d{1,2}:\d{2}/.test(texto)) {
                        // Limpiamos el texto: quitamos el CSS y nos quedamos con lo importante
                        const datosLimpios = texto.replace(/a\.resize.*?\}/g, '').trim();
                        const partes = datosLimpios.split('Pista');
                        
                        if (partes.length > 1) {
                            const infoPista = "Pista" + partes[1];
                            const hora = infoPista.match(/\d{1,2}:\d{2}/)[0];
                            tablaHtml += `<tr><td>${infoPista.replace(hora, '').trim()}</td><td>${hora}</td></tr>`;
                        }
                    }
                });

                document.getElementById('resultado').innerHTML = tablaHtml + '</table>';
            } catch (e) {
                document.getElementById('resultado').innerHTML = "Error: " + e.message;
            }
        }
        cargar();
    </script>
</body>
</html>
