<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Partidas</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #2e7d32; color: white; }
        .foto-jugador { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; margin: 2px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <h1>Partidas Programadas</h1>
    <div id="tabla-resultado">Cargando datos...</div>

    <script>
        async function procesar() {
            try {
                const response = await fetch('/api/proxy');
                const htmlTexto = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlTexto, 'text/html');

                // Buscamos los bloques que contienen la información de la partida
                const bloques = doc.querySelectorAll('tr'); 
                let lista = [];

                bloques.forEach(bloque => {
                    // Buscamos la hora dentro del bloque
                    const horaEl = bloque.innerText.match(/(\d{1,2}:\d{2})/);
                    
                    // Buscamos imágenes dentro de este bloque
                    const imgs = bloque.querySelectorAll('img');
                    
                    if (horaEl) {
                        let fotosHtml = "";
                        imgs.forEach(img => {
                            let src = img.getAttribute('src');
                            if (src) {
                                // Aseguramos ruta absoluta
                                if (!src.startsWith('http')) {
                                    src = 'https://www.padellaborayaindoor.com' + src.replace('..', '');
                                }
                                fotosHtml += `<img src="${src}" class="foto-jugador" onerror="this.style.display='none'">`;
                            }
                        });

                        lista.push({
                            hora: horaEl[0],
                            fotos: fotosHtml || "Sin jugadores",
                            estado: bloque.innerText.includes('Cerrada') ? 'Cerrada' : 'Disponible'
                        });
                    }
                });

                // Ordenar por hora
                lista.sort((a, b) => a.hora.localeCompare(b.hora));

                // Dibujar tabla
                let html = `<table><tr><th>Hora</th><th>Jugadores</th><th>Estado</th></tr>`;
                lista.forEach(p => {
                    html += `<tr><td>${p.hora}</td><td>${p.fotos}</td><td>${p.estado}</td></tr>`;
                });
                html += `</table>`;
                
                document.getElementById('tabla-resultado').innerHTML = html;

            } catch (err) {
                document.getElementById('tabla-resultado').innerHTML = "Error al procesar: " + err.message;
            }
        }

        procesar();
    </script>
</body>
</html>
