<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Padel Alboraya - Partidas</title>
    <style>
        /* ESTILOS BÁSICOS Y RESISTENTES */
        body { font-family: sans-serif; background: #e0f2f1; padding: 20px; color: #333; }
        .grid-partidas { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .card { background: #fff; border: 3px solid #004d40; border-radius: 6px; width: calc(20% - 10px); min-width: 150px; box-sizing: border-box; display: flex; flex-direction: column; }
        .pista-header { background: #004d40; color: #fff; text-align: center; font-weight: bold; font-size: 1.1em; padding: 8px; }
        .info-container { padding: 10px; }
        
        /* ESTILOS DE JUGADOR */
        .jugador-bloque { display: flex; align-items: center; text-decoration: none; color: inherit; padding: 5px; }
        .jugador-bloque:not(:last-child) { border-bottom: 1px solid #ccc; }
        .foto-wrapper { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #777; background: #ddd; margin-right: 10px; flex-shrink: 0; }
        .foto { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: none; /* Se activa con JS */ }
        .nombre { font-size: 0.9em; font-weight: bold; }

        /* DEPURACIÓN */
        #debug { border: 2px solid red; background: #fff; padding: 10px; margin-bottom: 15px; color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1 style="color:#004d40; text-align:center">Partidas</h1>
    
    <div id="debug">Buscando estructuras...</div>

    <div id="app" class="grid-partidas">Cargando...</div>

    <script>
        fetch('/api/proxy')
            .then(res => res.text())
            .then(html => {
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const output = document.getElementById('app');
                const debugOutput = document.getElementById('debug');
                let htmlResultado = '';
                
                // --- CAPTURA DE BLOQUES ULTRA-RESISTENTE ---
                // Buscamos cualquier td o div que contenga el texto "Pista" y ":"
                const todosLosBloques = doc.querySelectorAll('td, div');
                let partidasDetectadas = [];

                todosLosBloques.forEach(bloque => {
                    const textoLimpiado = bloque.innerText.trim();
                    if(textoLimpiado.includes("Pista") && /\d{1,2}:\d{2}/.test(textoLimpiado)){
                        partidasDetectadas.push(bloque);
                    }
                });

                debugOutput.innerText = `Partidas potenciales detectadas: ${partidasDetectadas.length}`;

                // --- PROCESAMIENTO DE CADA BLOQUE DE PARTIDA ---
                partidasDetectadas.forEach(bloque => {
                    htmlResultado += `<div class="card">
                        <div class="pista-header">Pista: ${bloque.innerText.trim().substring(0,25)}...</div>
                        <div class="info-container">`;
                        
                    // Buscamos todos los enlaces de jugadores. He flexibilizado el selector a 'a', 
                    // porque es probable que el ID cambie.
                    const enlacesJugadores = bloque.querySelectorAll('a');

                    enlacesJugadores.forEach(enlace => {
                        const imgTag = enlace.querySelector('img');
                        let imgSrc = '';
                        let nombre = enlace.innerText.trim(); // Nombre que se ve en la web

                        // Si hay imagen, la extraemos y la convertimos en URL completa
                        if(imgTag){
                            imgSrc = imgTag.getAttribute('src');
                            if(imgSrc && !imgSrc.startsWith('http')){
                                imgSrc = 'https://www.padelalborayaindoor.com/' + imgSrc;
                            }
                        }

                        // Solo añadimos el jugador si tiene un nombre visible
                        if(nombre.length > 2){
