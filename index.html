<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Partidas - Padel Alboraya</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fdfdfd; padding: 20px; color: #000; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: #2e7d32; border-bottom: 3px solid #000; padding-bottom: 10px; margin-bottom: 25px; }
        
        .partida-card { background: #e8f5e9; border: 2px solid #000; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        .info-header { font-weight: 800; border-bottom: 2px solid #000; margin-bottom: 10px; padding-bottom: 5px; font-size: 1.1em; display: flex; justify-content: space-between; }
        
        .vs-grid { display: grid; grid-template-columns: 1fr auto 1fr; align-items: start; gap: 15px; }
        .equipo { font-size: 0.9em; }
        
        .jugador-fila { display: flex; align-items: center; margin-bottom: 8px; min-height: 35px; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #000; margin-right: 10px; object-fit: cover; background: #ccc; }
        .vs-label { font-weight: bold; font-style: italic; align-self: center; }
        .estado-badge { font-size: 0.7em; background: #fff; padding: 2px 6px; border: 1px solid #000; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Partidas</h1>
        <div id="resultado">Cargando...</div>
    </div>

    <script>
        // Imagen por defecto en base64 (un círculo gris)
        const DEFAULT_IMG = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23999'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";

        async function cargarPartidas() {
            try {
                const res = await fetch('/api/proxy');
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                
                // 1. Limpieza radical: eliminamos estilos y scripts que ensucian el texto
                doc.querySelectorAll('style, script, .participanteCuadro').forEach(el => el.remove());
                
                const bloques = doc.body.innerText.split('Pista').filter(b => /\d{1,2}:\d{2}/.test(b));
                let htmlResultado = '';
                
                bloques.forEach((bloque) => {
                    const hora = bloque.match(/\d{1,2}:\d{2}/)?.[0] || "";
                    const pista = bloque.substring(0, 2).trim();
                    const estado = bloque.includes('Cerrada') ? 'Cerrada' : 'Abierta';
                    
                    // 2. Extraer solo nombres ignorando líneas técnicas
                    const lineas = bloque.split('\n')
                        .map(l => l.trim())
                        .filter(l => l.length > 3 && !/[{;=><]/.test(l) && !/Cerrada|Niveles|Abierta|Eq\./i.test(l));
                    
                    const nombres = lineas.filter(l => /[a-zA-Z]{3,}/.test(l)).slice(0, 4);

                    const generarJugador = (i) => {
                        const nombre = nombres[i] || "Disponible";
                        // Usamos la imagen por defecto si la real falla
                        return `<div class="jugador-fila"><img src="${DEFAULT_IMG}" class="avatar" onerror="this.src='${DEFAULT_IMG}'"> ${nombre}</div>`;
                    };

                    htmlResultado += `
                        <div class="partida-card">
                            <div class="info-header">
                                <span>${hora} - Pista ${pista}</span>
                                <span class="estado-badge">${estado}</span>
                            </div>
                            <div class="vs-grid">
                                <div class="equipo">${generarJugador(0)}${generarJugador(1)}</div>
                                <div class="vs-label">VS</div>
                                <div class="equipo">${generarJugador(2)}${generarJugador(3)}</div>
                            </div>
                        </div>`;
                });
                document.getElementById('resultado').innerHTML = htmlResultado;
            } catch (e) { document.getElementById('resultado').innerHTML = "Error al cargar los datos."; }
        }
        document.addEventListener('DOMContentLoaded', cargarPartidas);
    </script>
</body>
</html>
