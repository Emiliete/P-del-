<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Partidas - Padel Alboraya</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fdfdfd; padding: 20px; color: #000; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: #2e7d32; border-bottom: 3px solid #000; padding-bottom: 10px; margin-bottom: 25px; }
        
        .partida-card { background: #e8f5e9; border: 2px solid #000; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        .info-header { font-weight: 800; border-bottom: 2px solid #000; margin-bottom: 10px; padding-bottom: 5px; font-size: 1.1em; display: flex; justify-content: space-between; }
        
        .vs-grid { display: grid; grid-template-columns: 1fr auto 1fr; align-items: start; gap: 15px; }
        .equipo { font-size: 0.85em; }
        
        .jugador-fila { display: flex; align-items: center; margin-bottom: 8px; min-height: 35px; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #000; margin-right: 10px; object-fit: cover; background: #ccc; }
        .vs-label { font-weight: bold; font-style: italic; align-self: center; }
        .estado-badge { font-size: 0.7em; background: #fff; padding: 2px 6px; border: 1px solid #000; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Partidas</h1>
        <div id="resultado">Cargando...</div>
    </div>

    <script>
        async function cargarPartidas() {
            const container = document.getElementById('resultado');
            try {
                const res = await fetch('/api/proxy');
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                
                // Limpiar basura técnica del DOM antes de extraer
                doc.querySelectorAll('script, style, link, meta, .participanteCuadro').forEach(e => e.remove());
                
                // Suponiendo que cada partida está en una fila de tabla o bloque identificable
                // Cambia 'tr' por el selector que englobe una partida completa en el sitio original
                const bloques = doc.querySelectorAll('tr'); 
                let htmlResultado = '';
                
                bloques.forEach((bloque) => {
                    const texto = bloque.innerText;
                    if (/\d{1,2}:\d{2}/.test(texto) && texto.includes('Pista')) {
                        const hora = texto.match(/\d{1,2}:\d{2}/)[0];
                        const estado = texto.includes('Cerrada') ? 'Cerrada' : 'Abierta';
                        
                        // Extraer nombres limpiamente: buscamos las líneas que contienen texto de jugador
                        const nombres = texto.split('\n')
                            .map(l => l.trim())
                            .filter(l => l.length > 3 && !/[{;]/.test(l) && !/Pista|Cerrada|Abierta|Niveles/i.test(l));
                        
                        // Obtener imágenes vinculadas a este bloque específico
                        const imagenes = bloque.querySelectorAll('img');

                        const generarJugador = (idx) => {
                            const nombre = nombres[idx] || "Disponible";
                            let src = imagenes[idx] ? imagenes[idx].getAttribute('src') : null;
                            if (src && !src.startsWith('http')) src = 'https://www.padelalborayaindoor.com/' + src.replace(/^\/+/, '');
                            
                            return `<div class="jugador-fila">
                                        <img src="${src || ''}" class="avatar" onerror="this.style.display='none'"> 
                                        ${nombre}
                                    </div>`;
                        };

                        htmlResultado += `
                            <div class="partida-card">
                                <div class="info-header"><span>${hora} - Pista</span><span class="estado-badge">${estado}</span></div>
                                <div class="vs-grid">
                                    <div class="equipo">${generarJugador(0)}${generarJugador(1)}</div>
                                    <div class="vs-label">VS</div>
                                    <div class="equipo">${generarJugador(2)}${generarJugador(3)}</div>
                                </div>
                            </div>`;
                    }
                });
                container.innerHTML = htmlResultado || "No hay partidas.";
            } catch (e) { container.innerHTML = "Error al cargar."; }
        }
        document.addEventListener('DOMContentLoaded', cargarPartidas);
    </script>
</body>
</html>
