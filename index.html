<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Padel Alboraya - Partidas</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 12px; }
        th { background: #2e7d32; color: white; }
        .fila-partida { border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Partidas Programadas</h1>
    <div id="resultado">Limpiando datos...</div>

    <script>
        async function cargar() {
            try {
                const res = await fetch('/api/proxy');
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                
                // Extraemos el texto limpio del cuerpo
                const texto = doc.body.innerText;
                
                // Dividimos por "Pista"
                const lineas = texto.split('Pista');
                
                let tablaHtml = '<table><tr><th>Partida</th></tr>';
                
                lineas.forEach(l => {
                    // Solo mostramos si contiene una hora (ej: 11:15, 8:15)
                    if (l.match(/\d{1,2}:\d{2}/)) {
                        // Limpiamos basura de CSS/JS que vimos en la captura
                        let limpia = l.replace(/a\.resize.*?\}\}/g, '')
                                      .replace(/function.*?\}\);/g, '')
                                      .replace(/\.participanteCuadro.*?block\}/g, '');
                        
                        tablaHtml += `<tr class="fila-partida"><td><strong>Pista</strong> ${limpia.trim()}</td></tr>`;
                    }
                });

                document.getElementById('resultado').innerHTML = tablaHtml + '</table>';
            } catch (e) {
                document.getElementById('resultado').innerHTML = "Error al procesar: " + e.message;
            }
        }
        cargar();
    </script>
</body>
</html>
