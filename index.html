<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Partidas</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #2e7d32; color: white; }
        /* Estilo para las fotos */
        .foto-jugador { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin: 2px; }
    </style>
</head>
<body>

    <h1>Partidas Programadas</h1>
    <div id="tabla-resultado">Cargando...</div>

    <script>
        async function procesar() {
            const response = await fetch('/api/proxy');
            const htmlTexto = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlTexto, 'text/html');

            const bloques = doc.querySelectorAll('.gridviewestilocabecera');
            let lista = [];

            bloques.forEach(cabecera => {
                const padre = cabecera.parentElement;
                
                // 1. Obtenemos todas las imágenes de esta partida
                const imgs = padre.querySelectorAll('img');
                let fotosHtml = "";
                imgs.forEach(img => {
                    let src = img.getAttribute('src');
                    // Si la ruta es relativa, la convertimos en absoluta
                    if (src && !src.startsWith('http')) {
                        src = 'https://www.padellaborayaindoor.com' + src.replace('..', '');
                    }
                    fotosHtml += `<img src="${src}" class="foto-jugador" onerror="this.style.display='none'">`;
                });

                lista.push({
                    hora: cabecera.innerText.match(/(\d{1,2}:\d{2})/)?.[0] || "",
                    fotos: fotosHtml,
                    estado: padre.innerText.includes('Cerrada') ? 'Cerrada' : 'Disponible'
                });
            });

            // Ordenar por hora
            lista.sort((a, b) => a.hora.localeCompare(b.hora));

            // Renderizar
            let html = `<table><tr><th>Hora</th><th>Jugadores</th><th>Estado</th></tr>`;
            lista.forEach(p => {
                if(p.hora) {
                    html += `<tr><td>${p.hora}</td><td>${p.fotos}</td><td>${p.estado}</td></tr>`;
                }
            });
            document.getElementById('tabla-resultado').innerHTML = html + `</table>`;
        }

        procesar();
    </script>
</body>
</html>
