<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Partidas</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .card { background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #2e7d32; }
        .jugador { font-size: 0.85em; margin: 4px 0; }
    </style>
</head>
<body>
    <h1>Partidas</h1>
    <div id="app">Cargando...</div>

    <script>
        async function init() {
            try {
                const res = await fetch('/api/proxy');
                const text = await res.text();
                const doc = new DOMParser().parseFromString(text, 'text/html');
                const filas = doc.querySelectorAll('tr');
                let html = '';

                filas.forEach(tr => {
                    const texto = tr.innerText.trim();
                    // Buscamos solo filas que tengan hora (ej: 11:15) y "Pista"
                    if (/\d{1,2}:\d{2}/.test(texto) && texto.includes('Pista')) {
                        // Limpiamos líneas vacías o de código
                        const lineas = texto.split('\n')
                            .map(l => l.trim())
                            .filter(l => l.length > 3 && !l.includes('{') && !l.includes('resize'));

                        if (lineas.length >= 3) {
                            html += `<div class="card">
                                <strong>${lineas[0]}</strong><br>
                                <div class="jugador">${lineas[1]}</div>
                                <div class="jugador">${lineas[2]}</div>
                                <div class="jugador">${lineas[3] || ''}</div>
                                <div class="jugador">${lineas[4] || ''}</div>
                            </div>`;
                        }
                    }
                });
                document.getElementById('app').innerHTML = html || "No se encontraron partidas.";
            } catch (err) {
                document.getElementById('app').innerHTML = "Error al cargar: " + err.message;
            }
        }
        init();
    </script>
</body>
</html>
