<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partidas - Padel Alboraya</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        h1 { text-align: center; color: #2e7d32; }
        table { width: 100%; max-width: 800px; margin: 20px auto; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #2e7d32; color: white; }
        .jugador { background: #e8f5e9; border: 1px solid #c8e6c9; border-radius: 4px; padding: 2px 6px; margin: 2px; font-size: 0.9em; display: inline-block; }
        #resultado { text-align: center; }
    </style>
</head>
<body>

    <h1>Partidas Programadas</h1>
    <div id="resultado">Cargando partidas...</div>

    <script>
        async function cargarPartidas() {
            try {
                const response = await fetch('/api/proxy');
                const htmlTexto = await response.text();
                const doc = new DOMParser().parseFromString(htmlTexto, 'text/html');
                const filas = doc.querySelectorAll('.gridviewestilocabecera');
                
                let tablaHtml = `<table><tr><th>Hora</th><th>Jugadores</th></tr>`;
                
                filas.forEach(cabecera => {
                    const fila = cabecera.closest('tr');
                    const horaMatch = cabecera.innerText.match(/\d{1,2}:\d{2}/);
                    
                    if (horaMatch) {
                        const hora = horaMatch[0];
                        const celdasJugador = fila.querySelectorAll('.participanteCuadro');
                        let nombres = [];

                        celdasJugador.forEach(celda => {
                            const nombre = celda.getAttribute('title');
                            // Filtramos: solo añadimos si tiene nombre y no es texto genérico
                            if (nombre && nombre.trim() !== "" && nombre.toLowerCase() !== "seleccionar") {
                                nombres.push(`<span class="jugador">👤 ${nombre}</span>`);
                            }
                        });

                        tablaHtml += `<tr>
                            <td><strong>${hora}</strong></td>
                            <td>${nombres.length > 0 ? nombres.join(' ') : '<em>Libre</em>'}</td>
                        </tr>`;
                    }
                });

                document.getElementById('resultado').innerHTML = tablaHtml + `</table>`;
            } catch (err) {
                document.getElementById('resultado').innerHTML = "Error al conectar con el servidor.";
                console.error(err);
            }
        }
        cargarPartidas();
    </script>
</body>
</html>
