<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Partidas - Padel Alboraya</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fdfdfd; padding: 20px; color: #000; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: #2e7d32; border-bottom: 3px solid #000; padding-bottom: 10px; margin-bottom: 25px; }
        
        .partida-card { background: #e8f5e9; border: 2px solid #000; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        .info-header { 
            font-weight: 800; 
            border-bottom: 2px solid #000; 
            margin-bottom: 10px; 
            padding-bottom: 5px; 
            font-size: 1.1em; 
            display: flex; 
            justify-content: space-between; 
        }
        
        .vs-grid { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 15px; }
        .equipo { font-size: 0.9em; }
        
        .jugador-fila { display: flex; align-items: center; margin-bottom: 8px; height: 35px; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #000; margin-right: 10px; object-fit: cover; background: #ddd; }
        .vs-label { font-weight: bold; font-style: italic; }
        .estado-badge { font-size: 0.8em; background: #fff; padding: 2px 6px; border: 1px solid #000; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Partidas</h1>
        <div id="resultado">Cargando...</div>
    </div>

    <script>
        async function cargarPartidas() {
            try {
                const res = await fetch('/api/proxy');
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const todasLasImgs = Array.from(doc.querySelectorAll('img'));
                const bloques = doc.body.innerText.split('Pista').filter(b => /\d{1,2}:\d{2}/.test(b));
                
                let htmlResultado = '';
                
                bloques.forEach((bloque, idx) => {
                    const hora = bloque.match(/\d{1,2}:\d{2}/)?.[0] || "";
                    const pista = bloque.substring(0, 2).trim();
                    // Detectar si está cerrada o abierta
                    const estado = bloque.includes('Cerrada') ? 'Cerrada' : 'Abierta';
                    
                    const lineas = bloque.split('\n').map(l => l.trim())
                        .filter(l => l.length > 3 && !l.includes('Eq.') && !l.includes('Niveles') && !l.includes('Cerrada') && !l.includes('Abierta'));
                    const nombres = lineas.filter(l => /[a-zA-Z]{3,}/.test(l)).slice(0, 4);

                    const generarJugador = (i) => {
                        const nombre = nombres[i] || "Disponible";
                        const img = todasLasImgs[i + (idx * 4)] ? 
                                    `<img src="https://www.padelalborayaindoor.com/${todasLasImgs[i + (idx * 4)].getAttribute('src')}" class="avatar">` : 
                                    `<div class="avatar"></div>`;
                        return `<div class="jugador-fila">${img} ${nombre}</div>`;
                    };

                    htmlResultado += `
                        <div class="partida-card">
                            <div class="info-header">
                                <span>${hora} - Pista ${pista}</span>
                                <span class="estado-badge">${estado}</span>
                            </div>
                            <div class="vs-grid">
                                <div class="equipo">${generarJugador(0)}${generarJugador(1)}</div>
                                <div class="vs-label">VS</div>
                                <div class="equipo">${generarJugador(2)}${generarJugador(3)}</div>
                            </div>
                        </div>`;
                });
                document.getElementById('resultado').innerHTML = htmlResultado;
            } catch (e) { document.getElementById('resultado').innerHTML = "Error al cargar."; }
        }
        document.addEventListener('DOMContentLoaded', cargarPartidas);
    </script>
</body>
</html>
