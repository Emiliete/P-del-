<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Partidasdsgsfdsfsf</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #2e7d32; text-align: center; }
        
        .partida-card { 
            background: #fff; border-left: 5px solid #2e7d32; 
            padding: 15px; margin-bottom: 15px; 
            border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        .header { 
            font-weight: bold; border-bottom: 1px solid #eee; 
            margin-bottom: 10px; padding-bottom: 5px; color: #333;
        }
        .jugador-item { display: flex; align-items: center; margin: 5px 0; font-size: 0.9em; }
        .fotoParticipante { width: 30px; height: 30px; border-radius: 50%; margin-right: 10px; object-fit: cover; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Partidas</h1>
        <div id="app">Cargando partidas...</div>
    </div>

    <script>
        async function renderizarPartidas() {
            try {
                const res = await fetch('/api/proxy');
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                
                // Buscamos los contenedores que agrupan los datos (ajustar según inspección web)
                const bloques = doc.querySelectorAll('tr, .pista-contenedor'); 
                const app = document.getElementById('app');
                let htmlResultado = '';

                bloques.forEach(bloque => {
                    const texto = bloque.innerText;
                    
                    // Solo procesamos si el bloque contiene información de Pista y hora
                    if (texto.includes('Pista') && /\d{1,2}:\d{2}/.test(texto)) {
                        const lineas = texto.split('\n').filter(l => l.trim().length > 3);
                        const fotos = bloque.querySelectorAll('.fotoParticipante');
                        
                        htmlResultado += `<div class="partida-card">
                            <div class="header">${lineas[0]}</div>
                            <div class="jugadores">`;
                        
                        // Extraemos jugadores evitando ruido técnico
                        lineas.slice(1).forEach((nombre, i) => {
                            const img = fotos[i] ? fotos[i].getAttribute('src') : '';
                            htmlResultado += `<div class="jugador-item">
                                ${img ? `<img src="${img}" class="fotoParticipante">` : ''}
                                <span>${nombre}</span>
                            </div>`;
                        });
                        
                        htmlResultado += `</div></div>`;
                    }
                });

                app.innerHTML = htmlResultado || "No se encontraron partidas.";
            } catch (e) {
                document.getElementById('app').innerHTML = "Error al conectar.";
            }
        }
        renderizarPartidas();
    </script>
</body>
</html>
