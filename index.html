<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Partidas</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #2e7d32; color: white; }
    </style>
</head>
<body>
    <h1>Partidas Programadas</h1>
    <div id="resultado">Procesando datos...</div>

    <script>
        async function cargar() {
            try {
                const res = await fetch('/api/proxy');
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const filas = doc.querySelectorAll('tr');
                
                let tablaHtml = '<table><tr><th>Información</th></tr>';
                let filasEncontradas = 0;
                
                filas.forEach(f => {
                    const texto = f.innerText.trim();
                    // Buscamos filas relevantes y limpiamos el ruido de CSS
                    if (texto.includes('Pista')) {
                        const textoLimpio = texto.replace(/a\.resize.*?\}/g, '').trim();
                        tablaHtml += `<tr><td>${textoLimpio}</td></tr>`;
                        filasEncontradas++;
                    }
                });

                document.getElementById('resultado').innerHTML = 
                    filasEncontradas > 0 ? tablaHtml + '</table>' : "No se encontraron datos de pistas.";
            } catch (e) {
                document.getElementById('resultado').innerHTML = "Error: " + e.message;
            }
        }
        cargar();
    </script>
</body>
</html>
