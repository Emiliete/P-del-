<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Partidas Padel</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #2e7d32; color: white; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <h2>Partidas Programadas</h2>
    <table id="tablaPartidas">
        <thead>
            <tr><th>Hora</th><th>Pista</th><th>Jugadores</th><th>Estado</th></tr>
        </thead>
        <tbody id="app"></tbody>
    </table>

<script>
async function procesarPartidas() {
    try {
        // 1. Seleccionamos los bloques. Ajusta '.bloque-partida' a la clase real de tu web.
        const bloques = Array.from(document.querySelectorAll('.bloque-partida')); 
        let lista = [];

        bloques.forEach(bloque => {
            const horaText = bloque.querySelector('.hora')?.innerText || "00:00";
            const pista = parseInt(bloque.querySelector('.pista')?.innerText || 0);
            
            // Calculamos minutos para ordenar
            const [h, m] = horaText.split(':').map(Number);
            
            lista.push({
                hora: horaText,
                minutos: (h * 60) + m,
                pista: pista,
                jugadores: bloque.querySelector('.participanteCuadro')?.innerHTML || "Sin jugadores",
                estado: bloque.innerText.includes('Completa') ? 'Completa' : 'Disponible'
            });
        });

        // 2. Ordenar por hora y pista
        lista.sort((a, b) => a.minutos - b.minutos || a.pista - b.pista);

        // 3. Renderizar
        document.getElementById('app').innerHTML = lista.map(p => `
            <tr>
                <td>${p.hora}</td>
                <td>${p.pista}</td>
                <td>${p.jugadores}</td>
                <td>${p.estado}</td>
            </tr>
        `).join('');

    } catch (e) {
        document.getElementById('app').innerHTML = "<tr><td colspan='4'>Error al procesar los datos.</td></tr>";
    }
}

// Ejecutar
procesarPartidas();
</script>
</body>
</html>
