<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Partidas</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #2e7d32; color: white; }
        .jugador { font-size: 12px; margin: 2px; display: inline-block; }
    </style>
</head>
<body>
    <h1>Partidas Programadas</h1>
    <div id="resultado">Cargando...</div>

    <script>
        async function cargar() {
            try {
                const res = await fetch('/api/proxy');
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const filas = doc.querySelectorAll('.gridviewestilocabecera');
                
                let tabla = '<table><tr><th>Hora</th><th>Jugadores</th></tr>';
                
                filas.forEach(f => {
                    const tr = f.closest('tr');
                    const hora = f.innerText.match(/\d{1,2}:\d{2}/)?.[0] || "-";
                    const partes = tr.querySelectorAll('.participanteCuadro');
                    let nombres = "";
                    
                    partes.forEach(p => {
                        nombres += `<span class="jugador">👤 ${p.title || 'Jugador'}</span> `;
                    });

                    tabla += `<tr><td>${hora}</td><td>${nombres || 'Libre'}</td></tr>`;
                });

                document.getElementById('resultado').innerHTML = tabla + '</table>';
            } catch (e) {
                document.getElementById('resultado').innerHTML = "Error: " + e.message;
            }
        }
        cargar();
    </script>
</body>
</html>
