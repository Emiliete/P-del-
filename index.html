<div id="app"></div>

<script>
async function fetchMatches() {
    try {
        // 1. Seleccionamos todos los contenedores que empiezan por "Pista"
        // Según tu primer mensaje, cada partida parece ser un bloque principal.
        // Ajusta este selector si fuera necesario (ej: document.querySelectorAll('.clase-de-tu-bloque'))
        const bloques = Array.from(document.querySelectorAll('body > div')).filter(d => d.innerText.includes('Pista'));
        
        let matches = [];

        bloques.forEach(bloque => {
            const texto = bloque.innerText;
            const horaMatch = texto.match(/(\d{1,2}:\d{2})/);
            const pistaMatch = texto.match(/Pista (\d+)/);
            
            if (horaMatch && pistaMatch) {
                const hora = horaMatch[0];
                // Buscamos el contenedor de imágenes (participanteCuadro)
                const jugadores = bloque.querySelectorAll('.participanteCuadro');
                let jugadoresHtml = Array.from(jugadores).map(j => j.innerHTML).join('');

                matches.push({
                    hora: hora,
                    minutos: parseInt(hora.split(':')[0]) * 60 + parseInt(hora.split(':')[1]),
                    pista: parseInt(pistaMatch[1]),
                    jugadoresHtml: jugadoresHtml || "Sin jugadores",
                    estado: texto.includes('Completa') ? 'Completa' : 'Disponible'
                });
            }
        });

        // 2. Ordenamos por tiempo y pista
        matches.sort((a, b) => a.minutos - b.minutos || a.pista - b.pista);

        // 3. Generamos la tabla
        let html = `
        <table border="1">
            <thead>
                <tr><th>Hora</th><th>Pista</th><th>Jugadores</th><th>Estado</th></tr>
            </thead>
            <tbody>
                ${matches.map(m => `
                    <tr>
                        <td>${m.hora}</td>
                        <td>${m.pista}</td>
                        <td>${m.jugadoresHtml}</td>
                        <td>${m.estado}</td>
                    </tr>
                `).join('')}
            </tbody>
        </table>`;

        document.getElementById('app').innerHTML = html;
    } catch (e) {
        document.getElementById('app').innerHTML = "Error al procesar: " + e.message;
    }
}

// Ejecutamos
fetchMatches();
</script>
