<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Partidas Padel Alboraya</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #e8f5e9; padding: 20px; }
        .container { max-width: 950px; margin: auto; }
        .match-row { border: 2px solid black; background: #c8e6c9; margin: 8px 0; padding: 10px; border-radius: 8px; font-size: 0.85em; }
        h1 { color: #2e7d32; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Partidas y Jugadores</h1>
        <div id="app">Cargando datos detallados...</div>
    </div>
    <script>
        async function fetchMatches() {
            try {
                const res = await fetch('/api/proxy');
                const htmlText = await res.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                
                const container = document.getElementById('app');
                container.innerHTML = '';
                
                // Buscamos todas las tablas en la página
                const tables = doc.querySelectorAll('table');
                
                tables.forEach(table => {
                    const rows = table.querySelectorAll('tr');
                    rows.forEach(row => {
                        // Filtramos para que solo muestre filas con contenido relevante
                        if (row.innerText.includes('Pista') || row.innerText.includes('Eq.')) {
                            const div = document.createElement('div');
                            div.className = 'match-row';
                            div.innerText = row.innerText.replace(/\s+/g, ' ').trim();
                            container.appendChild(div);
                        }
                    });
                });
            } catch (e) {
                document.getElementById('app').innerHTML = "Error al extraer la tabla.";
            }
        }
        setInterval(fetchMatches, 20000);
        fetchMatches();
    </script>
</body>
</html>
