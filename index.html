<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Partidas</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #2e7d32; color: white; }
        .info { color: #555; font-size: 0.8em; }
    </style>
</head>
<body>
    <h1>Partidas Programadas</h1>
    <div id="resultado">Buscando datos...</div>

    <script>
        async function cargar() {
            try {
                const res = await fetch('/api/proxy');
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                
                // Buscamos todas las filas de todas las tablas
                const filas = doc.querySelectorAll('tr');
                let tablaHtml = '<table><tr><th>Posible Hora</th><th>Contenido de la fila</th></tr>';
                let encontrado = false;

                filas.forEach(f => {
                    const texto = f.innerText.trim();
                    // Buscamos filas que tengan formato de hora (ej: 18:30)
                    if (/\d{1,2}:\d{2}/.test(texto)) {
                        tablaHtml += `<tr><td>${texto.match(/\d{1,2}:\d{2}/)[0]}</td><td>${texto.substring(0, 100)}...</td></tr>`;
                        encontrado = true;
                    }
                });

                document.getElementById('resultado').innerHTML = encontrado ? tablaHtml + '</table>' : "No se encontraron filas con horas. Revisa la consola.";
            } catch (e) {
                document.getElementById('resultado').innerHTML = "Error: " + e.message;
            }
        }
        cargar();
    </script>
</body>
</html>
