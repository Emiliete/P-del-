<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Partidas - Padel Alboraya</title>
    <style>
        body { font-family: sans-serif; background-color: #fcfcfc; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .partida-card { background: #eef7ee; border: 2px solid #2e7d32; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        .info-header { font-weight: bold; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-bottom: 10px; }
        .vs-grid { display: grid; grid-template-columns: 1fr auto 1fr; align-items: start; gap: 10px; }

<body>
    <div class="container">
        <h1>Partidas</h1>
        <div id="resultado">Cargando...</div>
    </div>

    <script>
        async function cargarPartidas() {
            try {
                const res = await fetch('/api/proxy');
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');

                // 1. ELIMINACIÓN DE BASURA: Borramos todo lo que no sea contenido útil antes de leer
                doc.querySelectorAll('script, style, link, meta, img, .participanteCuadro').forEach(e => e.remove());

                // 2. BUSCAR FILAS: Seleccionamos las filas (tr) de las tablas
                const filas = doc.querySelectorAll('tr');
                let htmlResultado = '';

                filas.forEach(fila => {
                    const texto = fila.innerText.trim();
                    // Filtro estricto: solo filas que contengan una hora y la palabra Pista
                    if (/\d{1,2}:\d{2}/.test(texto) && texto.includes('Pista')) {
                        
                        // Limpieza de nombres: eliminamos manualmente las etiquetas de equipo y código
                        const lineas = texto.split('\n')
                            .map(l => l.trim())
                            .filter(l => l.length > 3 && 
                                         !l.includes('resize') && 
                                         !l.includes('{') && 
                                         !l.includes('Eq.') && 
                                         !l.includes('Niveles'));

                        if (lineas.length >= 3) {
                            htmlResultado += `
                            <div class="partida-card">
                                <div class="info-header">${lineas[0]}</div>
                                <div class="vs-grid">
                                    <div class="equipo">
                                        <div class="jugador">${lineas[1] || ''}</div>
                                        <div class="jugador">${lineas[2] || ''}</div>
                                    </div>
                                    <div style="font-weight:bold">VS</div>
                                    <div class="equipo">
                                        <div class="jugador">${lineas[3] || ''}</div>
                                        <div class="jugador">${lineas[4] || ''}</div>
                                    </div>
                                </div>
                            </div>`;
                        }
                    }
                });
                document.getElementById('resultado').innerHTML = htmlResultado || "No hay partidas.";
            } catch (e) {
                document.getElementById('resultado').innerHTML = "Error al cargar.";
            }
        }
        cargarPartidas();
    </script>
</body>
</html>
