<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partidas - Padel Alboraya</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fdfdfd; padding: 20px; color: #000; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: #2e7d32; border-bottom: 3px solid #000; padding-bottom: 10px; margin-bottom: 25px; }
        
        .partida-card { 
            background: #e8f5e9; 
            border: 2px solid #000; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 4px;
        }
        
        .info-header { font-weight: 800; border-bottom: 2px solid #000; margin-bottom: 10px; padding-bottom: 5px; font-size: 1.1em; }
        
        .vs-grid { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; }
        .equipo { font-size: 0.9em; line-height: 1.4; }
        .vs-label { font-weight: bold; font-style: italic; padding: 0 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Partidas</h1>
        <div id="resultado">Cargando partidas...</div>
    </div>

    <script>
        async function cargarPartidas() {
            const container = document.getElementById('resultado');
            if (!container) return; // Seguridad extra

            try {
                const res = await fetch('/api/proxy');
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                
                const bloques = doc.body.innerText.split('Pista').filter(b => b.includes(':'));
                let htmlResultado = '';
                
                bloques.forEach((bloque) => {
                    const hora = bloque.match(/\d{1,2}:\d{2}/)?.[0] || "";
                    const pista = bloque.substring(0, 2).trim();
                    
                    const lineas = bloque.split('\n')
                        .map(l => l.trim())
                        .filter(l => l.length > 5 && 
                                     !l.includes('Cerrada') && 
                                     !l.includes('Niveles') && 
                                     !l.includes('{') &&
                                     !l.includes('function'));
                    
                    const nombres = lineas.map(l => l.replace(/^\d[.,]\d{1,2}-/, '').trim());
                    
                    const equipoA = nombres.slice(0, 2).join('<br>');
                    const equipoB = nombres.slice(2, 4).join('<br>');

                    htmlResultado += `
                        <div class="partida-card">
                            <div class="info-header">${hora} - Pista ${pista}</div>
                            <div class="vs-grid">
                                <div class="equipo">${equipoA || "Esperando..."}</div>
                                <div class="vs-label">VS</div>
                                <div class="equipo">${equipoB || "Esperando..."}</div>
                            </div>
                        </div>`;
                });
                container.innerHTML = htmlResultado || "No hay partidas disponibles.";
            } catch (e) { 
                container.innerHTML = "Error al conectar con el servidor."; 
            }
        }

        // Ejecutar solo cuando el HTML esté listo
        document.addEventListener('DOMContentLoaded', cargarPartidas);
    </script>
</body>
</html>
