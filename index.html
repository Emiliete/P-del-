<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Partidas</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ccc; padding: 10px; }
        th { background: #2e7d32; color: white; }
    </style>
</head>
<body>
    <h1>Partidas Programadas</h1>
    <div id="resultado">Limpiando datos...</div>

    <script>
        async function cargar() {
            try {
                const res = await fetch('/api/proxy');
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                const textoCompleto = doc.body.innerText;
                
                // Dividimos el texto gigante cada vez que aparece "Pista"
                const filas = textoCompleto.split('Pista').filter(f => f.trim().length > 10);
                
                let tablaHtml = '<table><tr><th>Partida encontrada</th></tr>';
                
                filas.forEach(f => {
                    // Limpiamos basura (códigos CSS que se colaron)
                    const limpia = f.replace(/a\.resize.*?\}/g, '').replace(/\.participanteCuadro.*?block\}/g, '');
                    tablaHtml += `<tr><td>Pista ${limpia.trim()}</td></tr>`;
                });

                document.getElementById('resultado').innerHTML = tablaHtml + '</table>';
            } catch (e) {
                document.getElementById('resultado').innerHTML = "Error: " + e.message;
            }
        }
        cargar();
    </script>
</body>
</html>
