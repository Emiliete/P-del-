<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Partidas - Padel Alboraya</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fdfdfd; padding: 20px; color: #000; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: #2e7d32; border-bottom: 3px solid #000; padding-bottom: 10px; margin-bottom: 25px; }
        
        .partida-card { background: #e8f5e9; border: 2px solid #000; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        .info-header { font-weight: 800; border-bottom: 2px solid #000; margin-bottom: 10px; padding-bottom: 5px; font-size: 1.1em; display: flex; justify-content: space-between; }
        
        .vs-grid { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 15px; }
        .equipo { font-size: 0.9em; }
        
        /* Contenedor de jugador optimizado */
        .jugador-fila { display: flex; align-items: center; margin-bottom: 8px; height: 35px; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #000; margin-right: 10px; object-fit: cover; background: #ddd; flex-shrink: 0; }
        
        /* Clase para ocultar avatares que fallan */
        .hidden { display: none !important; }
        
        .vs-label { font-weight: bold; font-style: italic; }
        .estado-badge { font-size: 0.7em; background: #fff; padding: 2px 6px; border: 1px solid #000; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Partidas</h1>
        <div id="resultado">Cargando...</div>
    </div>

    <script>
        async function cargarPartidas() {
            try {
                const res = await fetch('/api/proxy');
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                
                // Limpiar basura técnica
                doc.querySelectorAll('script, style, link, .participanteCuadro').forEach(e => e.remove());
                
                const filas = doc.querySelectorAll('tr'); 
                let htmlResultado = '';
                
                filas.forEach((fila) => {
                    const texto = fila.innerText;
                    if (/\d{1,2}:\d{2}/.test(texto) && texto.includes('Pista')) {
                        const hora = texto.match(/\d{1,2}:\d{2}/)[0];
                        const estado = texto.includes('Cerrada') ? 'Cerrada' : 'Abierta';
                        
                        const nombres = texto.split('\n')
                            .map(l => l.trim())
                            .filter(l => l.length > 3 && !/[{;]/.test(l) && !/Pista|Cerrada|Abierta|Niveles|Eq\./i.test(l));
                        
                        const imgs = fila.querySelectorAll('img');

                        const generarFila = (i) => {
                            const nombre = nombres[i] || "Disponible";
                            let src = imgs[i] ? imgs[i].getAttribute('src') : null;
                            if (src && !src.startsWith('http')) src = 'https://www.padelalborayaindoor.com/' + src.replace(/^\/+/, '');
                            
                            // Si hay imagen, intentamos cargarla. Si falla, ocultamos el elemento avatar.
                            return `<div class="jugador-fila">
                                        ${src ? `<img src="${src}" class="avatar" onerror="this.classList.add('hidden')">` : `<div class="avatar"></div>`}
                                        ${nombre}
                                    </div>`;
                        };

                        htmlResultado += `
                            <div class="partida-card">
                                <div class="info-header"><span>${hora} - Pista</span><span class="estado-badge">${estado}</span></div>
                                <div class="vs-grid">
                                    <div class="equipo">${generarFila(0)}${generarFila(1)}</div>
                                    <div class="vs-label">VS</div>
                                    <div class="equipo">${generarFila(2)}${generarFila(3)}</div>
                                </div>
                            </div>`;
                    }
                });
                document.getElementById('resultado').innerHTML = htmlResultado;
            } catch (e) { document.getElementById('resultado').innerHTML = "Error al cargar."; }
        }
        document.addEventListener('DOMContentLoaded', cargarPartidas);
    </script>
</body>
</html>
