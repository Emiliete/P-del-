<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Partidas Padel</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #2e7d32; color: white; }
    </style>
</head>
<body>

    <h1>Partidas Programadas</h1>
    <div id="status">Cargando datos...</div>
    <div id="tabla-resultado"></div>

    <script>
        async function procesar() {
            try {
                // 1. Llamamos a tu proxy
                const response = await fetch('/api/proxy');
                const htmlTexto = await response.text();

                // 2. Convertimos el texto en un DOM real
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlTexto, 'text/html');

                // 3. Procesamos los bloques (ajusta estos selectores según lo que veas en la web)
                const bloques = doc.querySelectorAll('.gridviewestilocabecera');
                let lista = [];

                bloques.forEach(cabecera => {
                    const padre = cabecera.parentElement;
                    const texto = cabecera.innerText;
                    
                    // Extraemos datos básicos
                    const horaMatch = texto.match(/(\d{1,2}:\d{2})/);
                    const jugadores = padre.querySelector('.participanteCuadro')?.innerHTML || "Sin jugadores";

                    if (horaMatch) {
                        lista.push({
                            hora: horaMatch[0],
                            jugadores: jugadores,
                            estado: texto.includes('Cerrada') ? 'Cerrada' : 'Disponible'
                        });
                    }
                });

                // 4. Renderizamos la tabla
                let html = `<table><tr><th>Hora</th><th>Jugadores</th><th>Estado</th></tr>`;
                lista.forEach(p => {
                    html += `<tr><td>${p.hora}</td><td>${p.jugadores}</td><td>${p.estado}</td></tr>`;
                });
                html += `</table>`;
                
                document.getElementById('tabla-resultado').innerHTML = html;
                document.getElementById('status').innerText = "";

            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "Error al procesar los datos.";
            }
        }

        procesar();
    </script>
</body>
</html>
