<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Partidas - Padel Alboraya</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fdfdfd; padding: 20px; color: #000; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: #2e7d32; border-bottom: 3px solid #000; padding-bottom: 10px; }
        
        .partida-card { background: #e8f5e9; border: 2px solid #000; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        .info-header { font-weight: 800; border-bottom: 2px solid #000; margin-bottom: 10px; padding-bottom: 5px; }
        
        .vs-grid { display: grid; grid-template-columns: 1fr auto 1fr; align-items: start; gap: 10px; }
        .equipo { font-size: 0.85em; }
        .vs-label { font-weight: bold; align-self: center; }
        
        .jugador-item { display: flex; align-items: center; margin-bottom: 6px; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #000; margin-right: 8px; object-fit: cover; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Partidas</h1>
        <div id="resultado">Cargando...</div>
    </div>

    <script>
        async function cargarPartidas() {
            try {
                const res = await fetch('/api/proxy');
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html');
                
                // Seleccionamos todos los contenedores de "partida"
                const cuadros = doc.querySelectorAll('.participanteCuadro'); // Ajusta este selector según la web real
                let htmlResultado = '';
                
                // Vamos a buscar los bloques de texto que contienen las partidas
                const bloques = doc.body.innerText.split('Pista');
                
                bloques.forEach((bloque) => {
                    if (/\d{1,2}:\d{2}/.test(bloque)) {
                        const hora = bloque.match(/\d{1,2}:\d{2}/)[0];
                        
                        // Filtramos para que solo coja texto que parezca un nombre (sin basura de CSS)
                        const lineas = bloque.split('\n').filter(l => l.length > 3 && !l.includes('{') && !l.includes('resize'));
                        
                        // Extraemos nombres (están después del nivel/número)
                        const nombres = lineas.filter(l => /[a-zA-Z]{3,}/.test(l)).slice(0, 4);
                        
                        let equipoA = "", equipoB = "";
                        nombres.forEach((n, i) => {
                            let item = `<div class="jugador-item"><span>${n.substring(0, 18)}</span></div>`;
                            if (i < 2) equipoA += item; else equipoB += item;
                        });

                        htmlResultado += `
                            <div class="partida-card">
                                <div class="info-header">${hora} - Pista ${bloque.substring(0, 2).trim()}</div>
                                <div class="vs-grid">
                                    <div class="equipo">${equipoA || "No disponible"}</div>
                                    <div class="vs-label">VS</div>
                                    <div class="equipo">${equipoB || "No disponible"}</div>
                                </div>
                            </div>`;
                    }
                });
                document.getElementById('resultado').innerHTML = htmlResultado;
            } catch (e) { document.getElementById('resultado').innerHTML = "Error al cargar."; }
        }
        cargarPartidas();
    </script>
</body>
</html>
